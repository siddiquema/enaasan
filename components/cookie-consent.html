<div id="cookie-consent-banner" class="cookie-consent-banner" style="display: none;">
  <div class="cookie-consent-content">
    <div class="cookie-consent-text">
      <h3>Privacy &amp; Analytics</h3>
      <p>We use Google Analytics to understand how students use enaasan. This helps us improve the site. Your data is anonymous and never shared.</p>
      <p><a href="/privacy.html" target="_blank">Learn more about our privacy practices</a></p>
    </div>
    <div class="cookie-consent-actions">
      <button id="cookie-decline" class="cookie-btn cookie-decline">Minimal Tracking</button>
      <button id="cookie-accept" class="cookie-btn cookie-accept">Allow Analytics</button>
    </div>
  </div>
</div>

<style>
.cookie-consent-banner {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--color-surface, #fff);
  border-top: 1px solid var(--color-border, #e5e5e5);
  box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.1);
  z-index: 9999;
  font-size: 0.875rem;
  line-height: 1.5;
}

.cookie-consent-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 2rem;
}

.cookie-consent-text h3 {
  margin: 0 0 0.5rem 0;
  font-size: 1rem;
  font-weight: 600;
}

.cookie-consent-text p {
  margin: 0.5rem 0;
  color: var(--color-text-secondary, #666);
}

.cookie-consent-text a {
  color: var(--color-primary, #0066cc);
  text-decoration: none;
}

.cookie-consent-text a:hover {
  text-decoration: underline;
}

.cookie-consent-actions {
  display: flex;
  gap: 1rem;
  flex-shrink: 0;
}

.cookie-btn {
  padding: 0.625rem 1.25rem;
  border: none;
  border-radius: 4px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.cookie-decline {
  background: var(--color-secondary, #f0f0f0);
  color: var(--color-text, #333);
  border: 1px solid var(--color-border, #ddd);
}

.cookie-decline:hover {
  background: var(--color-border, #e5e5e5);
}

.cookie-accept {
  background: var(--color-primary, #0066cc);
  color: white;
}

.cookie-accept:hover {
  background: var(--color-primary-dark, #0052a3);
}

@media (max-width: 768px) {
  .cookie-consent-content {
    flex-direction: column;
    gap: 1rem;
  }

  .cookie-consent-actions {
    width: 100%;
    flex-direction: column;
  }

  .cookie-btn {
    width: 100%;
  }
}

@media (prefers-color-scheme: dark) {
  .cookie-consent-banner {
    background: var(--color-surface, #1a1a1a);
    border-top-color: var(--color-border, #333);
  }

  .cookie-consent-text p {
    color: var(--color-text-secondary, #aaa);
  }
}
</style>

<script>
  function initCookieConsent() {
    const banner = document.getElementById('cookie-consent-banner');
    const acceptBtn = document.getElementById('cookie-accept');
    const declineBtn = document.getElementById('cookie-decline');

    const consentKey = 'enaasan_analytics_consent';
    const consentGiven = localStorage.getItem(consentKey);

    // Only show banner if no consent decision has been made
    if (!consentGiven) {
      banner.style.display = 'block';
    }

    acceptBtn.addEventListener('click', function() {
      localStorage.setItem(consentKey, 'accepted');
      banner.style.display = 'none';
      loadAnalytics();
    });

    declineBtn.addEventListener('click', function() {
      localStorage.setItem(consentKey, 'declined');
      banner.style.display = 'none';
    });
  }

  function loadAnalytics() {
    const consentKey = 'enaasan_analytics_consent';
    const consentGiven = localStorage.getItem(consentKey);

    // Only load GA4 if user has accepted
    if (consentGiven === 'accepted') {
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W8XTZC5NYR');

      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-W8XTZC5NYR';
      document.head.appendChild(script);
    }
  }

  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCookieConsent);
  } else {
    initCookieConsent();
  }

  // Load analytics if already consented
  loadAnalytics();
</script>
