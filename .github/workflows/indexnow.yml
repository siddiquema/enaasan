name: IndexNow ping

# Notifies Bing/IndexNow whenever site pages change, so AI answer engines
# that lean on Bing's index (ChatGPT, Copilot) pick up updates quickly.
# Key file: 89dcc8ed321f4c9e961c398bd5bf5e72.txt at the domain root.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated page paths to submit (e.g. /faq.html /streams.html). Use / for the homepage."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Submit changed pages to IndexNow
        env:
          HOST: enaasan.online
          KEY: 89dcc8ed321f4c9e961c398bd5bf5e72
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          MANUAL_URLS: ${{ inputs.urls }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL_URLS" ]; then
            PATHS="$MANUAL_URLS"
          else
            # Diff range of this push; fall back to last commit for force-push edge cases
            if git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              RANGE="$BEFORE..$AFTER"
            else
              RANGE="$AFTER~1..$AFTER"
            fi
            PATHS=$(git diff --name-only "$RANGE" -- '*.html' | sed 's|^|/|; s|^/index\.html$|/|' || true)
          fi

          if [ -z "$PATHS" ]; then
            echo "No page changes to submit."
            exit 0
          fi

          URLS=$(for p in $PATHS; do echo "https://$HOST$p"; done | jq -R . | jq -s .)
          PAYLOAD=$(jq -n --arg host "$HOST" --arg key "$KEY" \
            --arg keyLocation "https://$HOST/$KEY.txt" --argjson urlList "$URLS" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting:"
          echo "$PAYLOAD" | jq .

          STATUS=$(curl -s -o /tmp/indexnow-response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          cat /tmp/indexnow-response.txt || true
          echo "IndexNow HTTP status: $STATUS"
          # 200 = submitted, 202 = accepted (key validation pending) — both fine
          case "$STATUS" in
            200|202) exit 0 ;;
            *) echo "IndexNow submission failed" >&2; exit 1 ;;
          esac
